name: Build, audit, and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (includes Pagefind search index)
        run: npm run build

      - name: Stage a copy of dist/ under its deployed base path
        # Astro builds to dist/about-us/ directly - there's no literal
        # "championsreviews-clone" subfolder in the output. That prefix only
        # exists in URLs because GitHub Pages serves this repo under a
        # subpath, so root-relative hrefs like "/championsreviews-clone/
        # about-us/" won't resolve against dist/ as-is. A real copy (not a
        # symlink - a self-referential one caused infinite recursion, and
        # lychee's --remap couldn't take a space-containing value through
        # this action's arg passing) bridges the gap safely.
        run: |
          mkdir -p /tmp/pages-check/championsreviews-clone
          cp -r dist/. /tmp/pages-check/championsreviews-clone/

      - name: Check for broken internal links
        # --offline skips every remote URL entirely (the hundreds of Amazon
        # affiliate/product-image links and social share links per review
        # page) and only validates that internal/relative links resolve to
        # a real file in the build output - which is what this step is
        # actually meant to catch. Checking live external links isn't useful
        # here anyway: it can't affect the build, and hitting hundreds of
        # third-party hosts is slow/flaky (some visibly hung indefinitely).
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --root-dir /tmp/pages-check
            --no-progress
            --offline
            '/tmp/pages-check/**/*.html'
          fail: true

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: dist/
          # One post's inline <style> uses CSS container queries, which are
          # real, valid, modern CSS - vnu.jar's bundled CSS checker just
          # predates the spec. Narrowly ignored by exact substring (no
          # spaces - INPUT_EXTRA is word-split unquoted) rather than
          # disabling CSS checking entirely.
          extra: --ignore container-type container-name @container

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Stage a copy of dist/ under its deployed base path
        # Astro bakes the /championsreviews-clone base path into every
        # emitted asset/link, since that's where GitHub Pages actually
        # serves this repo from. Lighthouse CI's staticDistDir server just
        # serves the given directory at "/", so without this the page's
        # own CSS/JS/image references 404 against the local test server -
        # same fix as the lychee link-check step in the build job.
        run: |
          mkdir -p /tmp/pages-check/championsreviews-clone
          cp -r dist/. /tmp/pages-check/championsreviews-clone/
      - name: Lighthouse CI (performance/SEO/accessibility/best-practices budget)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
