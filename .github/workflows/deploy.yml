name: Build, audit, and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (includes Pagefind search index)
        run: npm run build

      - name: Alias dist root under the site's base path
        # Astro builds to dist/about-us/ directly - there's no literal
        # "championsreviews-clone" subfolder in the build output. That
        # prefix only exists in URLs because GitHub Pages happens to serve
        # this repo under a subpath. The self-referential symlink below
        # makes root-relative hrefs like "/championsreviews-clone/about-us/"
        # resolve locally the same way they will once actually deployed.
        run: ln -s . dist/championsreviews-clone

      - name: Check for broken internal links
        # --offline skips every remote URL entirely (the hundreds of Amazon
        # affiliate/product-image links and social share links per review
        # page) and only validates that internal/relative links resolve to
        # a real file in the build output - which is what this step is
        # actually meant to catch. Checking live external links isn't useful
        # here anyway: it can't affect the build, and hitting hundreds of
        # third-party hosts is slow/flaky (some visibly hung indefinitely).
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --root-dir ${{ github.workspace }}/dist
            --no-progress
            --offline
            'dist/**/*.html'
          fail: true

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Lighthouse CI (performance/SEO/accessibility/best-practices budget)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
